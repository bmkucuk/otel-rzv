{% extends "base.html" %}
{% set active = "oda-durumu" %}
{% block title %}Oda Durumu{% endblock %}
{% block page_title %}🛏️ Oda Durumu{% endblock %}

{% block content %}
<style>
.oda-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.nav-buttons-group{display:flex;gap:6px;align-items:center}
.oda-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.oda-nav button:hover{border-color:var(--accent);color:var(--accent)}
.oda-nav .period{flex:1;text-align:center;font-weight:700;font-size:14px;color:var(--text)}
.legend{display:flex;gap:18px;margin-bottom:12px;font-size:13px;align-items:center;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:8px;font-weight:500}
.leg-dot{width:18px;height:18px;border-radius:4px}

/* Sticky header bar */
.sticky-bar{position:sticky;top:0;z-index:20;background:var(--bg, #0d1117);padding-bottom:8px}

.grid-wrap{overflow-x:auto}
.oda-grid{display:grid;gap:2px;min-width:max-content}
.header-row,.oda-row{display:contents}
.day-header{background:var(--header);color:var(--text2);font-size:11px;font-weight:700;padding:6px 4px;text-align:center;width:60px;border:1px solid var(--border);border-radius:3px;white-space:pre-line;position:sticky;top:0;z-index:5}
.day-header.today{color:var(--accent);border-color:var(--accent)40}
.oda-label{background:var(--card);padding:5px 8px;font-size:12px;font-weight:700;border-radius:4px;border:1px solid var(--border);width:100px;white-space:nowrap;display:flex;align-items:center}
.oda-label.leo{color:var(--leo)}
.oda-label.cv{color:var(--cv)}
.section-header{background:var(--header);color:var(--text);font-size:15px;font-weight:800;padding:10px 8px;border-radius:3px;grid-column:1/-1;margin:8px 0 2px;text-align:center;letter-spacing:2px}
.cell{width:60px;height:34px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:default;position:relative}
.cell.bos{background:var(--sidebar)}
.cell.bos.today{background:var(--card2);border-color:var(--accent)40}

/* Dolu oda → Canlı mavi (tek otel) */
.cell.dolu-genel{background:#0a4a7a;color:#00cfff;border-color:#00cfff}
.cell.dolu-genel.giris{background:#0070cc;color:#fff;border-color:#00cfff}
.oda-label.genel{color:var(--accent)}

.cell:hover .tooltip{display:block}
.tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0a1628;border:1px solid var(--border);padding:8px 12px;border-radius:6px;white-space:nowrap;font-size:12px;color:var(--text);z-index:10;pointer-events:none;box-shadow:0 4px 16px #0006}
.tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0a1628}
</style>

<div class="sticky-bar">
  <div class="oda-nav">
    <div class="nav-buttons-group">
      <button onclick="shift(-7)">◀ Önceki Hafta</button>
      <button onclick="goToday()" style="color:var(--accent)">Bugün</button>
      <button onclick="shift(7)">Sonraki Hafta ▶</button>
      <button onclick="reload()" id="yenile-btn">🔄 Yenile</button>
    </div>
    <div class="period" id="period-lbl">—</div>
  </div>

  <div class="legend">
    <span><div class="leg-dot" style="background:#0070cc;border:2px solid #00cfff"></div> Otel Leo (Dolu)</span>
    <span><div class="leg-dot" style="background:#cc4a00;border:2px solid #ff6b00"></div> Cunda Villa (Dolu)</span>
    <span><div class="leg-dot" style="background:var(--sidebar);border:1px solid var(--border)"></div> Boş</span>
    <span style="color:var(--text2);font-size:12px">★ Parlak renk = Giriş günü</span>
  </div>
</div>

<div class="grid-wrap">
  <div id="oda-grid"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let startDate = new Date();
startDate.setHours(0,0,0,0);

function toISO(d) {
  return d.toISOString().split('T')[0];
}

function shift(days) {
  startDate.setDate(startDate.getDate() + days);
  load();
}

function goToday() {
  startDate = new Date();
  startDate.setHours(0,0,0,0);
  load();
}

async function reload() {
  const btn = document.getElementById('yenile-btn');
  btn.textContent = '⏳ Yükleniyor...';
  btn.disabled = true;
  await load();
  btn.textContent = '🔄 Yenile';
  btn.disabled = false;
}

async function load() {
  const d = await api(`/api/oda-durumu?start=${toISO(startDate)}`);
  render(d);
}

function render(d) {
  const today = d.today;
  const dates = d.dates;
  const grid = d.grid;

  // Period label
  const first = new Date(dates[0] + 'T00:00:00');
  const last  = new Date(dates[dates.length-1] + 'T00:00:00');
  document.getElementById('period-lbl').textContent =
    first.toLocaleDateString('tr-TR',{day:'numeric',month:'short'}) + ' – ' +
    last.toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});

  const dayNames = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];

  // Sticky header offset: sticky-bar height
  const barH = document.querySelector('.sticky-bar').offsetHeight;
  document.querySelectorAll('.day-header').forEach(el => el.style.top = barH + 'px');

  let html = `<div style="display:grid;grid-template-columns:100px repeat(${dates.length},60px);gap:2px">`;

  // Header row
  html += `<div></div>`;
  for (const dt of dates) {
    const d2 = new Date(dt + 'T00:00:00');
    const isToday = dt === today;
    html += `<div class="day-header${isToday?' today':''}" style="top:${barH}px">${dayNames[d2.getDay()]}\n${d2.getDate()}</div>`;
  }

  // Group by otel
  let lastOtel = null;
  for (const room of grid) {
    if (room.otel !== lastOtel) {
      lastOtel = room.otel;

    }

    const otelClass = 'genel';
    html += `<div class="oda-label genel">Oda-${room.oda_no}</div>`;

    for (let i = 0; i < dates.length; i++) {
      const dt = dates[i];
      const cell = room.cells[i];
      const isToday = dt === today;

      if (cell.dolu) {
        const doluClass = `dolu-genel${cell.is_giris ? ' giris' : ''}`;
        const girisF = cell.giris ? new Date(cell.giris+'T00:00:00').toLocaleDateString('tr-TR') : '';
        const cikisF = cell.cikis ? new Date(cell.cikis+'T00:00:00').toLocaleDateString('tr-TR') : '';
        html += `<div class="cell ${doluClass}">
          ${cell.initials}
          <div class="tooltip">${cell.musteri}<br>${girisF} – ${cikisF}<br>Föy: ${cell.foy_no}</div>
        </div>`;
      } else {
        html += `<div class="cell bos${isToday?' today':''}"></div>`;
      }
    }
  }

  html += '</div>';
  document.getElementById('oda-grid').innerHTML = html;
}

load();
</script>
{% endblock %}
